// Reusable CSV import component
function CsvImport({ layoutKey, onImport, entityName }) {
  const [show, setShow] = useState(false);
  const layout = CSV_LAYOUTS[layoutKey];
  const fileRef = useRef(null);

  const parseCsv = (text) => {
    const lines = text.split("\n").map(l => l.trim()).filter(l => l);
    if (lines.length < 2) return [];
    const headers = lines[0].split(",").map(h => h.trim());
    return lines.slice(1).map(line => {
      const vals = [];
      let current = "", inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        if (line[i] === '"') { inQuotes = !inQuotes; }
        else if (line[i] === ',' && !inQuotes) { vals.push(current.trim()); current = ""; }
        else { current += line[i]; }
      }
      vals.push(current.trim());
      const obj = {};
      headers.forEach((h, i) => { obj[h] = vals[i] || ""; });
      return obj;
    });
  };

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const rows = parseCsv(ev.target.result);
      if (rows.length > 0) { onImport(rows); setShow(false); }
    };
    reader.readAsText(file);
  };

  const handlePaste = () => {
    const text = prompt("Paste CSV content (with headers):");
    if (text) {
      const rows = parseCsv(text);
      if (rows.length > 0) { onImport(rows); setShow(false); }
    }
  };

  return (<div style={{ marginBottom: 10 }}>
    <button onClick={() => setShow(!show)} style={{ ...btnSm, fontSize: 10, borderColor: BLUE, color: BLUE }}>
      {show ? "\u25BC" : "\u25B6"} Import CSV {entityName ? "(" + entityName + ")" : ""}
    </button>
    {show && (<div style={{ marginTop: 8, border: "1.5px solid #BAE6FD", borderRadius: 8, padding: 12, background: "#F0F9FF" }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: BLUE, marginBottom: 6 }}>CSV Layout for {entityName || layoutKey}</div>
      <div style={{ fontSize: 10, color: "#0C4A6E", marginBottom: 4 }}><strong>Columns:</strong> {layout.cols}</div>
      <div style={{ fontSize: 10, color: "#0C4A6E", marginBottom: 4, fontFamily: "monospace", background: BLUE_BG, borderRadius: 4, padding: "4px 8px", overflowX: "auto", whiteSpace: "nowrap" }}>{layout.cols}<br/>{layout.example}</div>
      <div style={{ fontSize: 9, color: "#075985", marginBottom: 8, lineHeight: 1.4 }}>{layout.notes}</div>
      <div style={{ display: "flex", gap: 6 }}>
        <label style={{ ...btnSm, fontSize: 10, display: "inline-flex", alignItems: "center", gap: 4, cursor: "pointer", borderColor: BLUE, color: BLUE }}>
          Upload .csv <input ref={fileRef} type="file" accept=".csv,.txt" onChange={handleFile} style={{ display: "none" }} />
        </label>
        <button onClick={handlePaste} style={{ ...btnSm, fontSize: 10, borderColor: BLUE, color: BLUE }}>Paste CSV</button>
        <button onClick={() => sendPrompt("Generate a sample CSV file with 5 example rows for this layout:\n\nColumns: " + layout.cols + "\nContext: " + (entityName || layoutKey) + " for project " + "transformation\nNotes: " + layout.notes + "\n\nMake the data realistic for a " + layoutKey + " dataset in a regulated EU institutional context.")} style={{ ...btnSm, fontSize: 10, borderColor: GOLD, color: GOLD }}>AI: Generate sample CSV</button>
      </div>
    </div>)}
  </div>);
}

function FieldRenderer({ field, value, onChange }) {
  if (field.type === "textarea") return <textarea style={{ ...ta, minHeight: (field.rows || 3) * 24 }} placeholder={field.placeholder} value={value || ""} rows={field.rows || 3} onChange={e => onChange(field.key, e.target.value)} />;
  if (field.type === "select") return <select style={inp} value={value || ""} onChange={e => onChange(field.key, e.target.value)}><option value="">Select...</option>{field.options.map(o => <option key={o} value={o}>{o}</option>)}</select>;
  return <input type="text" style={inp} placeholder={field.placeholder} value={value || ""} onChange={e => onChange(field.key, e.target.value)} />;
}

function AiBtn({ loading, suggestion, onRequest, onApply }) {
  if (!suggestion && !loading) return <button onClick={onRequest} style={{ ...btnSm, borderColor: GOLD, color: GOLD, marginTop: 6, fontSize: 11 }}>Generate with AI</button>;
  if (loading) return <div style={{ background: GOLD_BG, borderRadius: 10, padding: "10px 14px", fontSize: 12, color: "#92400E", marginTop: 6 }}>Generating suggestion...</div>;
  return (<div style={{ background: "#FFFBEB", border: "1.5px solid #FCD34D", borderRadius: 10, padding: 14, marginTop: 6 }}>

}

function CompliancePanel({ domain, complianceState, setComplianceState }) {
  const regs = COMPLIANCE_DB[domain] || COMPLIANCE_DB["Other"];
  const toggle = (rid, ci) => setComplianceState(prev => ({ ...prev, [rid + "-" + ci]: !prev[rid + "-" + ci] }));
  const total = regs.reduce((s, r) => s + r.checks.length, 0);
  const checked = Object.values(complianceState).filter(Boolean).length;
  const pct = total > 0 ? Math.round((checked / total) * 100) : 0;
  return (<div style={{ ...card, padding: 0, overflow: "hidden" }}>
    <div style={{ background: N700, color: "#fff", padding: "12px 18px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
      <span style={{ fontWeight: 700, fontSize: 13, fontFamily: "'Georgia',serif" }}>Compliance — {domain}</span>
      <span style={{ fontSize: 12, background: pct >= 80 ? GREEN : pct >= 50 ? GOLD_L : RED, borderRadius: 12, padding: "3px 12px", fontWeight: 700 }}>{pct}%</span>
    </div>
    <div style={{ padding: "14px 18px", maxHeight: 320, overflow: "auto" }}>
      {regs.map(r => (<div key={r.id} style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: NAVY, marginBottom: 6, display: "flex", alignItems: "center", gap: 8 }}>{r.label} {r.critical && <span style={{ background: RED_BG, color: RED, fontSize: 10, padding: "2px 8px", borderRadius: 10, fontWeight: 600 }}>CRITICAL</span>}</div>
        {r.checks.map((c, ci) => {
          const k = r.id + "-" + ci, d = complianceState[k];
          return <label key={ci} style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 0", cursor: "pointer", fontSize: 12, color: d ? GREEN : N600 }}><input type="checkbox" checked={!!d} onChange={() => toggle(r.id, ci)} style={{ accentColor: GREEN }} /><span style={{ textDecoration: d ? "line-through" : "none", opacity: d ? 0.6 : 1 }}>{c}</span></label>;
        })}
      </div>))}
    </div>
  </div>);
}

  const addWf = () => setWorkflows(prev => [...prev, { id: "WF" + String(prev.length + 1).padStart(3, "0"), name: "", trigger: "", owner: "", steps: [{ type: "Start", description: "", actor: "", output: "" }] }]);
  const addRule = () => setRules(prev => [...prev, { id: "BR" + String(prev.length + 1).padStart(3, "0"), name: "", category: "Validation", priority: "Medium", condition: "", action: "", exception: "", source: "", relatedReq: "" }]);

  const importActors = (rows) => {
    const mapped = rows.map(r => ({ id: r.ID || "", name: r.Name || "", type: r.Type || "Primary Actor", description: r.Description || "", dataAccess: { C: (r.CRUD || "").includes("C"), R: (r.CRUD || "").includes("R"), U: (r.CRUD || "").includes("U"), D: (r.CRUD || "").includes("D") }, permissions: r.Permissions || "" }));
    setActors(prev => [...prev, ...mapped]);
  };
  const importWorkflows = (rows) => {
    const grouped = {};
    rows.forEach(r => {
      const wfId = r.WF_ID || "WF001";
      if (!grouped[wfId]) grouped[wfId] = { id: wfId, name: r.Name || "", trigger: r.Trigger || "", owner: r.Owner || "", steps: [] };
      grouped[wfId].steps.push({ type: r.Step_Type || "Action", description: r.Step_Description || "", actor: r.Step_Actor || "", output: r.Step_Output || "" });
    });
    setWorkflows(prev => [...prev, ...Object.values(grouped)]);
  };
  const importRules = (rows) => {
    const mapped = rows.map(r => ({ id: r.ID || "", name: r.Name || "", category: r.Category || "Validation", priority: r.Priority || "Medium", condition: r.Condition || "", action: r.Action || "", exception: r.Exception || "", source: r.Source || "", relatedReq: r.RelatedReq || "" }));
    setRules(prev => [...prev, ...mapped]);
  };

  const tabs = [{ k: "actors", l: "Actors (" + actors.length + ")" }, { k: "workflows", l: "Workflows (" + workflows.length + ")" }, { k: "rules", l: "Rules (" + rules.length + ")" }];

  return (<div>
    <div style={{ display: "flex", gap: 4, marginBottom: 14, borderBottom: "1.5px solid #E2E8F0", paddingBottom: 8 }}>
      {tabs.map(t => <button key={t.k} onClick={() => setTab(t.k)} style={{ ...btnSm, background: tab === t.k ? NAVY : "transparent", color: tab === t.k ? "#fff" : NAVY, borderColor: tab === t.k ? NAVY : N300 }}>{t.l}</button>)}
    </div>
    {tab === "actors" && (<div>
      <div style={{ display: "flex", gap: 6, marginBottom: 10, alignItems: "center" }}>
        <button onClick={addActor} style={btnAdd}>+ Add actor</button>
      </div>
      <CsvImport layoutKey="actors" entityName="Actors" onImport={importActors} />
      {actors.map((a, i) => (<div key={i} style={card}>
        <div style={{ display: "grid", gridTemplateColumns: "80px 1fr 1fr", gap: 6, marginBottom: 6 }}>
          <div><label style={lbl}>ID</label><input style={inp} value={a.id} onChange={e => setActors(p => p.map((x, j) => j === i ? { ...x, id: e.target.value } : x))} /></div>
          <div><label style={lbl}>Name</label><input style={inp} value={a.name} onChange={e => setActors(p => p.map((x, j) => j === i ? { ...x, name: e.target.value } : x))} placeholder="HQ Administrator" /></div>
          <div><label style={lbl}>Type</label><select style={inp} value={a.type} onChange={e => setActors(p => p.map((x, j) => j === i ? { ...x, type: e.target.value } : x))}>{ACTOR_TYPES.map(t => <option key={t}>{t}</option>)}</select></div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr auto auto", gap: 6 }}>
          <div><label style={lbl}>Description</label><input style={inp} value={a.description} onChange={e => setActors(p => p.map((x, j) => j === i ? { ...x, description: e.target.value } : x))} /></div>
          <div><label style={lbl}>CRUD</label><div style={{ display: "flex", gap: 2 }}>{CRUD_OPS.map(op => <label key={op} style={{ fontSize: 10, display: "flex", alignItems: "center", gap: 2 }}><input type="checkbox" checked={!!a.dataAccess[op]} onChange={() => setActors(p => p.map((x, j) => j === i ? { ...x, dataAccess: { ...x.dataAccess, [op]: !x.dataAccess[op] } } : x))} />{op}</label>)}</div></div>
          <button onClick={() => setActors(p => p.filter((_, j) => j !== i))} style={btnDel}>x</button>
        </div>
      </div>))}
    </div>)}
    {tab === "workflows" && (<div>
      <button onClick={addWf} style={{ ...btnAdd, marginBottom: 6 }}>+ Add workflow</button>
      <CsvImport layoutKey="workflows" entityName="Workflows" onImport={importWorkflows} />
      {workflows.map((w, i) => (<div key={i} style={card}>
        <div style={{ display: "grid", gridTemplateColumns: "80px 1fr 1fr 1fr auto", gap: 6, marginBottom: 6 }}>
          <div><label style={lbl}>ID</label><input style={inp} value={w.id} onChange={e => setWorkflows(p => p.map((x, j) => j === i ? { ...x, id: e.target.value } : x))} /></div>
          <div><label style={lbl}>Name</label><input style={inp} value={w.name} onChange={e => setWorkflows(p => p.map((x, j) => j === i ? { ...x, name: e.target.value } : x))} /></div>
          <div><label style={lbl}>Trigger</label><input style={inp} value={w.trigger} onChange={e => setWorkflows(p => p.map((x, j) => j === i ? { ...x, trigger: e.target.value } : x))} /></div>
          <div><label style={lbl}>Owner</label><input style={inp} value={w.owner} onChange={e => setWorkflows(p => p.map((x, j) => j === i ? { ...x, owner: e.target.value } : x))} /></div>
          <button onClick={() => setWorkflows(p => p.filter((_, j) => j !== i))} style={btnDel}>x</button>
        </div>
        {w.steps.map((s, si) => (<div key={si} style={{ display: "grid", gridTemplateColumns: "24px 100px 1fr 100px 1fr auto", gap: 4, marginBottom: 4, alignItems: "center" }}>
          <span style={{ fontSize: 10, color: N400, textAlign: "center" }}>{si + 1}</span>
          <select style={{ ...inp, fontSize: 10 }} value={s.type} onChange={e => setWorkflows(p => p.map((x, j) => j === i ? { ...x, steps: x.steps.map((st, k) => k === si ? { ...st, type: e.target.value } : st) } : x))}>{STEP_TYPES.map(t => <option key={t}>{t}</option>)}</select>
          <input style={{ ...inp, fontSize: 10 }} value={s.description} placeholder="Step description" onChange={e => setWorkflows(p => p.map((x, j) => j === i ? { ...x, steps: x.steps.map((st, k) => k === si ? { ...st, description: e.target.value } : st) } : x))} />
          <input style={{ ...inp, fontSize: 10 }} value={s.actor} placeholder="Actor" onChange={e => setWorkflows(p => p.map((x, j) => j === i ? { ...x, steps: x.steps.map((st, k) => k === si ? { ...st, actor: e.target.value } : st) } : x))} />
          <input style={{ ...inp, fontSize: 10 }} value={s.output} placeholder="Output" onChange={e => setWorkflows(p => p.map((x, j) => j === i ? { ...x, steps: x.steps.map((st, k) => k === si ? { ...st, output: e.target.value } : st) } : x))} />
          <button onClick={() => setWorkflows(p => p.map((x, j) => j === i ? { ...x, steps: x.steps.filter((_, k) => k !== si) } : x))} style={{ ...btnDel, fontSize: 10 }}>x</button>
        </div>))}
        <button onClick={() => setWorkflows(p => p.map((x, j) => j === i ? { ...x, steps: [...x.steps, { type: "Action", description: "", actor: "", output: "" }] } : x))} style={{ ...btnSm, fontSize: 10 }}>+ Step</button>
      </div>))}
    </div>)}
    {tab === "rules" && (<div>
      <button onClick={addRule} style={{ ...btnAdd, marginBottom: 6 }}>+ Add rule</button>
      <CsvImport layoutKey="rules" entityName="Business Rules" onImport={importRules} />
      {rules.map((r, i) => (<div key={i} style={card}>
        <div style={{ display: "grid", gridTemplateColumns: "80px 1fr 110px 80px auto", gap: 6, marginBottom: 6 }}>
          <div><label style={lbl}>ID</label><input style={inp} value={r.id} onChange={e => setRules(p => p.map((x, j) => j === i ? { ...x, id: e.target.value } : x))} /></div>
          <div><label style={lbl}>Name</label><input style={inp} value={r.name} onChange={e => setRules(p => p.map((x, j) => j === i ? { ...x, name: e.target.value } : x))} /></div>
          <div><label style={lbl}>Category</label><select style={inp} value={r.category} onChange={e => setRules(p => p.map((x, j) => j === i ? { ...x, category: e.target.value } : x))}>{BR_CATEGORIES.map(c => <option key={c}>{c}</option>)}</select></div>
          <div><label style={lbl}>Priority</label><select style={inp} value={r.priority} onChange={e => setRules(p => p.map((x, j) => j === i ? { ...x, priority: e.target.value } : x))}><option>Critical</option><option>High</option><option>Medium</option><option>Low</option></select></div>
          <button onClick={() => setRules(p => p.filter((_, j) => j !== i))} style={btnDel}>x</button>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
          <div><label style={lbl}>IF (condition)</label><textarea style={{ ...ta, fontSize: 11 }} rows={2} value={r.condition} onChange={e => setRules(p => p.map((x, j) => j === i ? { ...x, condition: e.target.value } : x))} /></div>
          <div><label style={lbl}>THEN (action)</label><textarea style={{ ...ta, fontSize: 11 }} rows={2} value={r.action} onChange={e => setRules(p => p.map((x, j) => j === i ? { ...x, action: e.target.value } : x))} /></div>
          <div><label style={lbl}>ELSE (exception)</label><textarea style={{ ...ta, fontSize: 11 }} rows={2} value={r.exception} onChange={e => setRules(p => p.map((x, j) => j === i ? { ...x, exception: e.target.value } : x))} /></div>
        </div>
      </div>))}
    </div>)}
  </div>);
}

// ── DATA MODEL & FIELD MAPPING (new - Gap 1,2,3 from initial gap analysis) ──

function DataModelPhase({ entities, setEntities, workflows }) {
  const [activeEntity, setActiveEntity] = useState(0);
  const wfNames = workflows.map(w => w.name || w.id);
  const addEntity = () => setEntities(prev => [...prev, { id: "ENT" + String(prev.length + 1).padStart(2, "0"), name: "", sourceSystem: "", description: "", fields: [] }]);
  const updE = (i, k, v) => setEntities(p => p.map((e, j) => j === i ? { ...e, [k]: v } : e));
  const delE = (i) => { setEntities(p => p.filter((_, j) => j !== i)); if (activeEntity >= i && activeEntity > 0) setActiveEntity(activeEntity - 1); };
  const addField = (ei) => setEntities(p => p.map((e, j) => j === ei ? { ...e, fields: [...e.fields, { name: "", label: "", sourceSystem: "", sourcePath: "", targetField: "", dataType: "String", editMode: "Read", mandatory: false, brRef: "", sampleValue: "", migrationStatus: "ok", complianceNote: "", workflowUsage: {} }] } : e));
  const updF = (ei, fi, k, v) => setEntities(p => p.map((e, j) => j === ei ? { ...e, fields: e.fields.map((f, fj) => fj === fi ? { ...f, [k]: v } : f) } : e));
  const delF = (ei, fi) => setEntities(p => p.map((e, j) => j === ei ? { ...e, fields: e.fields.filter((_, fj) => fj !== fi) } : e));

  const importEntities = (rows) => {
    const mapped = rows.map(r => ({ id: r.Entity_ID || "", name: r.Entity_Name || "", sourceSystem: r.Source_System || "", description: r.Description || "", fields: [] }));
    setEntities(prev => [...prev, ...mapped]);
  };
  const importFields = (rows) => {
    if (!entities[activeEntity]) return;
    const mapped = rows.map(r => ({ name: r.Field_Name || "", label: r.Label || "", sourcePath: r.Source_Path || "", targetField: r.Target_Field || "", dataType: r.Data_Type || "String", editMode: r.Edit_Mode || "Read", mandatory: (r.Mandatory || "").toUpperCase() === "Y", brRef: r.BR_Ref || "", sampleValue: r.Sample_Value || "", migrationStatus: r.Migration_Status || "ok", complianceNote: r.Compliance_Note || "", workflowUsage: {} }));
    setEntities(p => p.map((e, j) => j === activeEntity ? { ...e, fields: [...e.fields, ...mapped] } : e));
  };

  const ent = entities[activeEntity];
  const totalFields = entities.reduce((s, e) => s + e.fields.length, 0);
  const tbiFields = entities.reduce((s, e) => s + e.fields.filter(f => f.migrationStatus === "TBI" || f.migrationStatus === "Gap").length, 0);

  return (<div>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
      <div>
        <div style={{ fontWeight: 700, fontSize: 15, color: NAVY }}>Data Model & Field Mapping</div>
        <div style={{ fontSize: 11, color: N400 }}>{entities.length} entities, {totalFields} fields, {tbiFields} TBI/Gap</div>
      </div>
      <button onClick={addEntity} style={btnAdd}>+ Add entity</button>
    </div>
    <CsvImport layoutKey="entities" entityName="Entities" onImport={importEntities} />
    {entities.length === 0 && <div style={{ textAlign: "center", padding: 30, color: N400, fontSize: 12 }}>Add an entity (e.g. LCK, LEF, BAF) to start mapping fields.</div>}
    {entities.length > 0 && (<>
      <div style={{ display: "flex", gap: 4, marginBottom: 12, flexWrap: "wrap" }}>
        {entities.map((e, i) => <button key={i} onClick={() => setActiveEntity(i)} style={{ ...btnSm, background: i === activeEntity ? NAVY : "transparent", color: i === activeEntity ? "#fff" : NAVY, borderColor: i === activeEntity ? NAVY : N300 }}>{e.name || e.id} ({e.fields.length})</button>)}
      </div>
      {ent && (<div>
        <div style={{ display: "grid", gridTemplateColumns: "100px 1fr 1fr 1fr auto", gap: 6, marginBottom: 10 }}>
          <div><label style={lbl}>Entity ID</label><input style={inp} value={ent.id} onChange={e => updE(activeEntity, "id", e.target.value)} /></div>
          <div><label style={lbl}>Entity Name</label><input style={inp} value={ent.name} onChange={e => updE(activeEntity, "name", e.target.value)} placeholder="e.g. Legal Commitment (LCK)" /></div>
          <div><label style={lbl}>Source System</label><input style={inp} value={ent.sourceSystem} onChange={e => updE(activeEntity, "sourceSystem", e.target.value)} placeholder="e.g. ABAC / Financial Hub" /></div>
          <div><label style={lbl}>Description</label><input style={inp} value={ent.description} onChange={e => updE(activeEntity, "description", e.target.value)} placeholder="Contract commitment data" /></div>
          <button onClick={() => delE(activeEntity)} style={btnDel}>x</button>
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <span style={{ fontSize: 12, fontWeight: 700, color: NAVY }}>{ent.fields.length} fields</span>
          <button onClick={() => addField(activeEntity)} style={{ ...btnAdd, fontSize: 10, padding: "4px 10px" }}>+ Add field</button>
        </div>
        <CsvImport layoutKey="fields" entityName={"Fields for " + (ent.name || ent.id)} onImport={importFields} />

        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 10 }}>
            <thead><tr style={{ background: N100 }}>
              {["#", "Field Name", "Label", "Source Path", "Target Field", "Type", "Edit", "Mand", "BR", "Sample", "Status", "Compliance", ...(wfNames.length > 0 ? wfNames : []), ""].map((h, i) => (
                <th key={i} style={{ padding: "6px 4px", textAlign: "left", fontWeight: 700, color: N400, fontSize: 9, whiteSpace: "nowrap", borderBottom: "1.5px solid #E2E8F0" }}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {ent.fields.map((f, fi) => (
                <tr key={fi} style={{ borderBottom: "0.5px solid #F1F5F9", background: f.migrationStatus === "TBI" ? GOLD_BG : f.migrationStatus === "Gap" ? RED_BG : "transparent" }}>
                  <td style={{ padding: "4px", color: N400 }}>{fi + 1}</td>
                  <td><input style={{ ...inp, fontSize: 10, padding: "3px 4px" }} value={f.name} onChange={e => updF(activeEntity, fi, "name", e.target.value)} placeholder="field_name" /></td>
                  <td><input style={{ ...inp, fontSize: 10, padding: "3px 4px" }} value={f.label} onChange={e => updF(activeEntity, fi, "label", e.target.value)} placeholder="UI Label" /></td>
                  <td><input style={{ ...inp, fontSize: 10, padding: "3px 4px" }} value={f.sourcePath} onChange={e => updF(activeEntity, fi, "sourcePath", e.target.value)} placeholder="api.path.field" /></td>
                  <td><input style={{ ...inp, fontSize: 10, padding: "3px 4px" }} value={f.targetField} onChange={e => updF(activeEntity, fi, "targetField", e.target.value)} placeholder="immo_field" /></td>
                  <td><select style={{ ...inp, fontSize: 9, padding: "2px" }} value={f.dataType} onChange={e => updF(activeEntity, fi, "dataType", e.target.value)}>{FIELD_TYPES.map(t => <option key={t}>{t}</option>)}</select></td>
                  <td><select style={{ ...inp, fontSize: 9, padding: "2px" }} value={f.editMode} onChange={e => updF(activeEntity, fi, "editMode", e.target.value)}>{EDIT_MODES.map(m => <option key={m}>{m}</option>)}</select></td>
                  <td style={{ textAlign: "center" }}><input type="checkbox" checked={!!f.mandatory} onChange={() => updF(activeEntity, fi, "mandatory", !f.mandatory)} /></td>
                  <td><input style={{ ...inp, fontSize: 9, padding: "2px 3px", width: 50 }} value={f.brRef} onChange={e => updF(activeEntity, fi, "brRef", e.target.value)} placeholder="BR053" /></td>
                  <td><input style={{ ...inp, fontSize: 9, padding: "2px 3px", width: 70 }} value={f.sampleValue} onChange={e => updF(activeEntity, fi, "sampleValue", e.target.value)} placeholder="EVT-2026-001" /></td>
                  <td><select style={{ ...inp, fontSize: 9, padding: "2px", background: f.migrationStatus === "ok" ? GREEN_BG : f.migrationStatus === "TBI" ? GOLD_BG : f.migrationStatus === "Gap" ? RED_BG : "#fff" }} value={f.migrationStatus} onChange={e => updF(activeEntity, fi, "migrationStatus", e.target.value)}>{MIGRATION_STATUSES.map(s => <option key={s}>{s}</option>)}</select></td>
                  <td><input style={{ ...inp, fontSize: 9, padding: "2px 3px", width: 60 }} value={f.complianceNote} onChange={e => updF(activeEntity, fi, "complianceNote", e.target.value)} placeholder="GDPR..." /></td>
                  {wfNames.map((wn, wi) => (
                    <td key={wi} style={{ textAlign: "center" }}><input type="checkbox" checked={!!f.workflowUsage[wn]} onChange={() => updF(activeEntity, fi, "workflowUsage", { ...f.workflowUsage, [wn]: !f.workflowUsage[wn] })} /></td>
                  ))}
                  <td><button onClick={() => delF(activeEntity, fi)} style={{ ...btnDel, fontSize: 10 }}>x</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>)}
    </>)}
  </div>);
}

// ── API SPECS (new - Gap 4,5 from initial gap analysis) ──

function ApiSpecPhase({ apiEndpoints, setApiEndpoints }) {
  const add = () => setApiEndpoints(prev => [...prev, { id: "EP" + String(prev.length + 1).padStart(2, "0"), method: "GET", path: "", description: "", entity: "", authType: "OAuth 2.0", requestSample: "", responseSample: "", errorCodes: [{ code: "200", description: "Success" }], callSequence: "", rateLimiting: "", circuitBreaker: "" }]);
  const upd = (i, k, v) => setApiEndpoints(p => p.map((e, j) => j === i ? { ...e, [k]: v } : e));
  const del = (i) => setApiEndpoints(p => p.filter((_, j) => j !== i));
  const addErr = (i) => setApiEndpoints(p => p.map((e, j) => j === i ? { ...e, errorCodes: [...e.errorCodes, { code: "", description: "" }] } : e));
  const updErr = (ei, eri, k, v) => setApiEndpoints(p => p.map((e, j) => j === ei ? { ...e, errorCodes: e.errorCodes.map((er, erj) => erj === eri ? { ...er, [k]: v } : er) } : e));

  const importEndpoints = (rows) => {
    const mapped = rows.map(r => ({ id: r.ID || "", method: r.Method || "GET", path: r.Path || "", description: r.Description || "", entity: r.Entity || "", requestSample: r.Request_Sample || "", responseSample: r.Response_Sample || "", callSequence: r.Call_Sequence || "", rateLimiting: r.Rate_Limiting || "", errorCodes: [{ code: "200", description: "Success" }] }));
    setApiEndpoints(prev => [...prev, ...mapped]);
  };

  return (<div>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
      <div>
        <div style={{ fontWeight: 700, fontSize: 15, color: NAVY }}>API Integration Specifications</div>
        <div style={{ fontSize: 11, color: N400 }}>Endpoints, payloads, error handling, call sequences</div>
      </div>
      <button onClick={add} style={btnAdd}>+ Add endpoint</button>
    </div>
    <CsvImport layoutKey="apiEndpoints" entityName="API Endpoints" onImport={importEndpoints} />
    {apiEndpoints.length === 0 && <div style={{ textAlign: "center", padding: 30, color: N400, fontSize: 12 }}>Add API endpoints (e.g. GET /legal-commitments) to document integration specs.</div>}
    {apiEndpoints.map((ep, i) => (<div key={i} style={{ ...card, border: "1.5px solid #CBD5E1" }}>
      <div style={{ display: "grid", gridTemplateColumns: "80px 80px 1fr 1fr auto", gap: 6, marginBottom: 8 }}>
        <div><label style={lbl}>ID</label><input style={inp} value={ep.id} onChange={e => upd(i, "id", e.target.value)} /></div>
        <div><label style={lbl}>Method</label><select style={inp} value={ep.method} onChange={e => upd(i, "method", e.target.value)}><option>GET</option><option>POST</option><option>PUT</option><option>PATCH</option><option>DELETE</option></select></div>
        <div><label style={lbl}>Path</label><input style={inp} value={ep.path} onChange={e => upd(i, "path", e.target.value)} placeholder="/legal-commitments/{localKey}" /></div>
        <div><label style={lbl}>Linked Entity</label><input style={inp} value={ep.entity} onChange={e => upd(i, "entity", e.target.value)} placeholder="LCK" /></div>
        <button onClick={() => del(i)} style={btnDel}>x</button>
      </div>
      <div style={{ marginBottom: 6 }}><label style={lbl}>Description</label><input style={inp} value={ep.description} onChange={e => upd(i, "description", e.target.value)} placeholder="Retrieve legal commitment data by local key" /></div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 6 }}>
        <div><label style={lbl}>Call Sequence / Dependencies</label><textarea style={{ ...ta, fontSize: 10 }} rows={2} value={ep.callSequence} onChange={e => upd(i, "callSequence", e.target.value)} placeholder="1. Call LCK endpoint\n2. Extract contractor keys\n3. Call LEF + BAF in parallel" /></div>
        <div><label style={lbl}>Auth / Rate Limiting</label><textarea style={{ ...ta, fontSize: 10 }} rows={2} value={ep.rateLimiting} onChange={e => upd(i, "rateLimiting", e.target.value)} placeholder="OAuth 2.0 Bearer token\n100 req/min, circuit breaker after 5 failures" /></div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 6 }}>
        <div><label style={lbl}>Request Sample (JSON)</label><textarea style={{ ...ta, fontSize: 10, fontFamily: "monospace" }} rows={3} value={ep.requestSample} onChange={e => upd(i, "requestSample", e.target.value)} placeholder='{"local_key": "EVT-2026-001"}' /></div>

          participants.forEach(p => { mermaid += "  participant " + p + "\n"; });
          mermaid += "\n";
          apiEndpoints.forEach(ep => {
            const target = ep.entity || "Server";
            const arrow = ep.method === "GET" ? "->>" : "-->>";
            mermaid += "  Client" + arrow + target + ": " + ep.method + " " + ep.path + "\n";
            mermaid += "  " + target + "-->>Client: " + (ep.errorCodes.find(e => e.code === "200")?.description || "Response") + "\n";
            if (ep.callSequence) {
              const triggers = ep.callSequence.match(/EP\d+/g);
              if (triggers) triggers.forEach(t => {
                const triggered = apiEndpoints.find(x => x.id === t);
                if (triggered) mermaid += "  " + target + "->>" + (triggered.entity || "Server") + ": " + triggered.method + " " + triggered.path + "\n  " + (triggered.entity || "Server") + "-->>" + target + ": Response\n";
              });
            }
            mermaid += "\n";
          });
          sendPrompt("Generate a Mermaid sequence diagram rendered as an HTML artifact. Use this Mermaid syntax:\n\n```mermaid\n" + mermaid + "```\n\nRender it using mermaid.js from esm.sh. Make it clean and professional with BAForge navy/gold branding.");

      <div style={{ padding: "14px 18px" }}>

          {(() => {
            const parts = [...new Set(apiEndpoints.map(ep => ep.entity).filter(Boolean))];
            let d = "sequenceDiagram\n  participant Client\n";
            parts.forEach(p => { d += "  participant " + p + "\n"; });
            d += "\n";
            apiEndpoints.forEach(ep => {
              const t = ep.entity || "Server";
              d += "  Client->>" + t + ": " + ep.method + " " + ep.path + "\n";
              d += "  " + t + "-->>Client: " + (ep.errorCodes.find(e => e.code === "200")?.description || "Response") + "\n";
              if (ep.callSequence) {
                const refs = ep.callSequence.match(/EP\d+/g);
                if (refs) refs.forEach(ref => {
                  const linked = apiEndpoints.find(x => x.id === ref);
                  if (linked) d += "  " + t + "->>" + (linked.entity || "Server") + ": " + linked.method + " " + linked.path + "\n  " + (linked.entity || "Server") + "-->>" + t + ": Response\n";
                });
              }
              d += "\n";
            });
            return d;
          })()}
        </div>
      </div>
    </div>)}
  </div>);

function ComplianceGate({ domain, complianceState }) {
  const regs = COMPLIANCE_DB[domain] || COMPLIANCE_DB["Other"];
  const critChecks = regs.filter(r => r.critical).flatMap(r => r.checks.map((c, ci) => ({ reg: r.label, check: c, key: r.id + "-" + ci })));
  const unchecked = critChecks.filter(c => !complianceState[c.key]);
  if (unchecked.length === 0) return <div style={{ background: GREEN_BG, borderRadius: 8, padding: "8px 14px", marginBottom: 12, fontSize: 11, color: "#166534", fontWeight: 600 }}>All critical compliance checks passed for {domain}.</div>;
  return (<div style={{ background: GOLD_BG, borderRadius: 8, padding: "10px 14px", marginBottom: 12 }}>
    <div style={{ fontSize: 11, fontWeight: 700, color: "#92400E", marginBottom: 4 }}>{unchecked.length} critical check{unchecked.length > 1 ? "s" : ""} not confirmed</div>
    {unchecked.slice(0, 4).map((c, i) => <div key={i} style={{ fontSize: 10, color: "#78350F", padding: "1px 0" }}>{c.reg}: {c.check}</div>)}
    {unchecked.length > 4 && <div style={{ fontSize: 10, color: "#92400E", fontStyle: "italic" }}>...and {unchecked.length - 4} more</div>}
  </div>);
}

// ── SDLC / JIRA INTEGRATION ──

const JIRA_ISSUE_TYPES = ["Epic", "Story", "Task", "Sub-task", "Bug", "Spike", "Test"];
const JIRA_PRIORITIES = ["Highest", "High", "Medium", "Low", "Lowest"];

function SdlcPhase({ jiraConfig, setJiraConfig, traceItems, actors, workflows, rules, openQuestions, entities, data }) {
  const [tab, setTab] = useState("mapping");
  const updCfg = (k, v) => setJiraConfig(prev => ({ ...prev, [k]: v }));

  // Auto-map agent artifacts to Jira items
  const autoMapped = [];
  // Workflows → Epics
  workflows.forEach(w => autoMapped.push({ source: "WF", sourceId: w.id, summary: w.name, type: "Epic", priority: "Medium", storyPoints: "", sprint: "", description: "Trigger: " + w.trigger + " | Owner: " + w.owner + " | Steps: " + w.steps.length, labels: "workflow" }));
  // Requirements → Stories
  traceItems.forEach(t => autoMapped.push({ source: "REQ", sourceId: t.reqId, summary: t.requirement || t.reqId, type: "Story", priority: t.priority === "Critical" ? "Highest" : t.priority === "High" ? "High" : t.priority === "Low" ? "Low" : "Medium", storyPoints: "", sprint: "", description: "User Story: " + (t.userStory || "TBD") + "\nAcceptance: " + (t.testSteps || "TBD"), labels: "requirement" }));
  // Business Rules → Tasks
  rules.forEach(r => autoMapped.push({ source: "BR", sourceId: r.id, summary: r.name + " [" + r.category + "]", type: "Task", priority: r.priority === "Critical" ? "Highest" : r.priority === "High" ? "High" : "Medium", storyPoints: "", sprint: "", description: "IF: " + r.condition + "\nTHEN: " + r.action + "\nELSE: " + r.exception, labels: "business-rule" }));
  // Open Questions (Blocked/Critical) → Spikes
  openQuestions.filter(q => q.status === "Open" || q.status === "Blocked").forEach(q => autoMapped.push({ source: "OQ", sourceId: q.id, summary: q.question, type: "Spike", priority: q.priority === "Critical" ? "Highest" : q.priority === "High" ? "High" : "Medium", storyPoints: "", sprint: "", description: "Context: " + q.context + "\nField: " + q.fieldRef, labels: "investigation" }));
  // TBI/Gap fields → Tasks
  entities.forEach(e => e.fields.filter(f => f.migrationStatus === "TBI" || f.migrationStatus === "Gap").forEach(f => autoMapped.push({ source: "FIELD", sourceId: e.id + "." + f.name, summary: "[" + f.migrationStatus + "] " + e.name + "." + f.name + " - " + f.label, type: "Task", priority: f.migrationStatus === "Gap" ? "High" : "Medium", storyPoints: "", sprint: "", description: "Entity: " + e.name + "\nSource: " + f.sourcePath + "\nTarget: " + f.targetField + "\nType: " + f.dataType + "\nBR: " + f.brRef, labels: "data-mapping," + f.migrationStatus.toLowerCase() })));

  const [items, setItems] = useState(autoMapped);
  const refreshMapping = () => setItems(autoMapped);
  const updItem = (i, k, v) => setItems(p => p.map((it, j) => j === i ? { ...it, [k]: v } : it));

  // Generate Jira CSV export
  const exportCsv = () => {
    const projKey = jiraConfig.projectKey || "PROJ";
    const headers = ["Summary", "Issue Type", "Priority", "Description", "Labels", "Story Points", "Sprint", "Component", "Source ID"];
    const rows = items.map(it => [
      '"' + (it.summary || "").replace(/"/g, '""') + '"',
      it.type, it.priority,
      '"' + (it.description || "").replace(/"/g, '""').replace(/\n/g, "\\n") + '"',
      it.labels, it.storyPoints || "", it.sprint || jiraConfig.sprintName || "",
      it.source, it.sourceId
    ].join(","));
    const csv = headers.join(",") + "\n" + rows.join("\n");
    sendPrompt("I have a Jira CSV import file for project " + projKey + " with " + items.length + " items. Here is the CSV content:\n\n```csv\n" + csv + "\n```\n\nPlease:\n1. Create this as a downloadable .csv file ready for Jira import\n2. Provide step-by-step Jira import instructions\n3. Flag any items that might need manual adjustment after import");
  };

  // MCP Jira actions
  const pn = data.projectName || "project";
  const pushToJira = () => {
    const itemSummary = items.slice(0, 20).map(it => "- [" + it.type + "] " + it.summary + " (" + it.priority + ")").join("\n");
    sendPrompt("Using Jira/Atlassian, create the following items in project \"" + (jiraConfig.projectKey || pn) + "\":\n\n" + itemSummary + (items.length > 20 ? "\n...and " + (items.length - 20) + " more items" : "") + "\n\nGroup epics as parent items and link stories to their corresponding epic based on the workflow mapping. Set sprint to \"" + (jiraConfig.sprintName || "Sprint 1") + "\".");
  };
  const syncFromJira = () => sendPrompt("Using Jira/Atlassian, retrieve all items from project \"" + (jiraConfig.projectKey || pn) + "\" and compare with my current backlog. Show: new items in Jira not in my agent, items in my agent not in Jira, and status differences.");
  const createSprint = () => sendPrompt("Using Jira/Atlassian, create a new sprint in project \"" + (jiraConfig.projectKey || pn) + "\" named \"" + (jiraConfig.sprintName || "Sprint 1") + "\". Suggest which of these items to include based on priority and story points:\n" + items.filter(it => it.storyPoints).map(it => it.sourceId + " " + it.summary + " (" + it.storyPoints + " SP, " + it.priority + ")").join("\n"));

  const totalSP = items.reduce((s, it) => s + (parseInt(it.storyPoints) || 0), 0);
  const byType = JIRA_ISSUE_TYPES.map(t => ({ type: t, count: items.filter(it => it.type === t).length })).filter(t => t.count > 0);
  const bySource = ["REQ", "BR", "WF", "OQ", "FIELD"].map(s => ({ source: s, count: items.filter(it => it.source === s).length })).filter(s => s.count > 0);

  return (<div>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
      <div>
        <div style={{ fontWeight: 700, fontSize: 15, color: NAVY }}>SDLC / Jira Integration</div>
        <div style={{ fontSize: 11, color: N400 }}>{items.length} items mapped, {totalSP} story points</div>
      </div>
      <button onClick={refreshMapping} style={{ ...btnSm, fontSize: 10 }}>Refresh from agent data</button>
    </div>

    {/* Config bar */}
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 6, marginBottom: 12, background: N50, borderRadius: 8, padding: 10 }}>
      <div><label style={lbl}>Project Key</label><input style={inp} value={jiraConfig.projectKey || ""} onChange={e => updCfg("projectKey", e.target.value)} placeholder="IMMO" /></div>
      <div><label style={lbl}>Board Type</label><select style={inp} value={jiraConfig.boardType || "Scrum"} onChange={e => updCfg("boardType", e.target.value)}><option>Scrum</option><option>Kanban</option></select></div>
      <div><label style={lbl}>Sprint Name</label><input style={inp} value={jiraConfig.sprintName || ""} onChange={e => updCfg("sprintName", e.target.value)} placeholder="Sprint 1" /></div>
      <div><label style={lbl}>Velocity (SP/sprint)</label><input style={inp} type="number" value={jiraConfig.velocity || ""} onChange={e => updCfg("velocity", e.target.value)} placeholder="30" /></div>
    </div>

    {/* Tabs */}
    <div style={{ display: "flex", gap: 4, marginBottom: 12, borderBottom: "1.5px solid #E2E8F0", paddingBottom: 8 }}>
      {[{ k: "mapping", l: "Backlog Mapping (" + items.length + ")" }, { k: "sprint", l: "Sprint Planning" }, { k: "actions", l: "Jira Actions" }].map(t =>
        <button key={t.k} onClick={() => setTab(t.k)} style={{ ...btnSm, background: tab === t.k ? NAVY : "transparent", color: tab === t.k ? "#fff" : NAVY }}>{t.l}</button>
      )}
    </div>

    {tab === "mapping" && (<div>
      {/* Summary cards */}
      <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
        {byType.map(t => <span key={t.type} style={{ fontSize: 10, padding: "3px 8px", borderRadius: 6, background: t.type === "Epic" ? "#E0E7FF" : t.type === "Story" ? GREEN_BG : t.type === "Spike" ? GOLD_BG : N100, color: t.type === "Epic" ? "#3730A3" : t.type === "Story" ? "#166534" : t.type === "Spike" ? "#92400E" : N600, fontWeight: 600 }}>{t.type}: {t.count}</span>)}
        <span style={{ fontSize: 10, padding: "3px 8px", borderRadius: 6, background: "#F0F9FF", color: BLUE, fontWeight: 600 }}>Total SP: {totalSP}</span>
      </div>

      {/* Items table */}
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 10 }}>
          <thead><tr style={{ background: N100 }}>
            {["Src", "ID", "Summary", "Type", "Priority", "SP", "Sprint", "Labels"].map(h => <th key={h} style={{ padding: "5px 4px", textAlign: "left", fontWeight: 700, color: N400, fontSize: 9, borderBottom: "1.5px solid #E2E8F0", whiteSpace: "nowrap" }}>{h}</th>)}
          </tr></thead>
          <tbody>{items.map((it, i) => (
            <tr key={i} style={{ borderBottom: "0.5px solid #F1F5F9" }}>
              <td style={{ padding: "3px 4px" }}><span style={{ fontSize: 9, fontWeight: 600, color: it.source === "REQ" ? BLUE : it.source === "BR" ? "#7C3AED" : it.source === "WF" ? "#0F766E" : it.source === "OQ" ? "#B45309" : N400 }}>{it.source}</span></td>
              <td style={{ padding: "3px 4px", fontSize: 9, color: N400 }}>{it.sourceId}</td>
              <td style={{ padding: "3px 4px", maxWidth: 200 }}><input style={{ ...inp, fontSize: 9, padding: "2px 4px" }} value={it.summary} onChange={e => updItem(i, "summary", e.target.value)} /></td>
              <td><select style={{ ...inp, fontSize: 9, padding: "2px" }} value={it.type} onChange={e => updItem(i, "type", e.target.value)}>{JIRA_ISSUE_TYPES.map(t => <option key={t}>{t}</option>)}</select></td>
              <td><select style={{ ...inp, fontSize: 9, padding: "2px" }} value={it.priority} onChange={e => updItem(i, "priority", e.target.value)}>{JIRA_PRIORITIES.map(p => <option key={p}>{p}</option>)}</select></td>
              <td><input style={{ ...inp, fontSize: 9, padding: "2px", width: 35 }} type="number" value={it.storyPoints} onChange={e => updItem(i, "storyPoints", e.target.value)} placeholder="-" /></td>
              <td><input style={{ ...inp, fontSize: 9, padding: "2px 4px", width: 65 }} value={it.sprint} onChange={e => updItem(i, "sprint", e.target.value)} placeholder={jiraConfig.sprintName || "Sprint"} /></td>
              <td style={{ fontSize: 9, color: N400 }}>{it.labels}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>)}

    {tab === "sprint" && (<div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        {/* Sprint capacity */}
        <div style={{ border: "1.5px solid #E2E8F0", borderRadius: 8, padding: 14 }}>
          <div style={{ fontWeight: 700, fontSize: 13, color: NAVY, marginBottom: 8 }}>Sprint capacity</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <div style={{ background: N50, borderRadius: 6, padding: 10 }}>
              <div style={{ fontSize: 10, color: N400 }}>Velocity target</div>
              <div style={{ fontSize: 20, fontWeight: 500 }}>{jiraConfig.velocity || "?"} SP</div>
            </div>
            <div style={{ background: N50, borderRadius: 6, padding: 10 }}>
              <div style={{ fontSize: 10, color: N400 }}>Total backlog</div>
              <div style={{ fontSize: 20, fontWeight: 500 }}>{totalSP} SP</div>
            </div>
            <div style={{ background: N50, borderRadius: 6, padding: 10 }}>
              <div style={{ fontSize: 10, color: N400 }}>Est. sprints needed</div>
              <div style={{ fontSize: 20, fontWeight: 500 }}>{jiraConfig.velocity ? Math.ceil(totalSP / parseInt(jiraConfig.velocity)) || "?" : "?"}</div>
            </div>
            <div style={{ background: N50, borderRadius: 6, padding: 10 }}>
              <div style={{ fontSize: 10, color: N400 }}>Unestimated items</div>
              <div style={{ fontSize: 20, fontWeight: 500, color: items.filter(it => !it.storyPoints).length > 0 ? RED : GREEN }}>{items.filter(it => !it.storyPoints).length}</div>
            </div>
          </div>
        </div>
        {/* Breakdown by source */}
        <div style={{ border: "1.5px solid #E2E8F0", borderRadius: 8, padding: 14 }}>
          <div style={{ fontWeight: 700, fontSize: 13, color: NAVY, marginBottom: 8 }}>Breakdown by origin</div>
          {bySource.map(s => {
            const sp = items.filter(it => it.source === s.source).reduce((sum, it) => sum + (parseInt(it.storyPoints) || 0), 0);
            const srcLabel = { REQ: "Requirements", BR: "Business Rules", WF: "Workflows (Epics)", OQ: "Open Questions", FIELD: "TBI/Gap Fields" }[s.source] || s.source;
            return (<div key={s.source} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "0.5px solid #F1F5F9" }}>
              <span style={{ fontSize: 11, color: N600 }}>{srcLabel}</span>
              <div style={{ display: "flex", gap: 8 }}>
                <span style={{ fontSize: 10, color: N400 }}>{s.count} items</span>
                <span style={{ fontSize: 10, fontWeight: 600, color: NAVY }}>{sp} SP</span>
              </div>
            </div>);
          })}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0 0", borderTop: "1.5px solid #E2E8F0", marginTop: 4 }}>
            <span style={{ fontSize: 12, fontWeight: 700, color: NAVY }}>Total</span>
            <div style={{ display: "flex", gap: 8 }}>
              <span style={{ fontSize: 11, fontWeight: 600 }}>{items.length} items</span>
              <span style={{ fontSize: 11, fontWeight: 700, color: GOLD }}>{totalSP} SP</span>
            </div>
          </div>
        </div>
      </div>
    </div>)}

    {tab === "actions" && (<div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
        <div style={{ border: "1.5px solid #E2E8F0", borderRadius: 8, padding: 14 }}>
          <div style={{ fontWeight: 700, fontSize: 13, color: NAVY, marginBottom: 6 }}>Export</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <button onClick={exportCsv} style={{ ...btnSm, textAlign: "left", padding: "8px 12px" }}>
              <div style={{ fontWeight: 700, fontSize: 11 }}>Export Jira CSV</div>
              <div style={{ fontSize: 9, color: N400, marginTop: 2 }}>{items.length} items ready for Jira import</div>
            </button>
            <button onClick={() => sendPrompt("Create an Excel (.xlsx) file with a Jira-compatible backlog. Project: " + (jiraConfig.projectKey || pn) + ". Include columns: Issue Type, Summary, Description, Priority, Story Points, Sprint, Labels, Component, Source ID. Data:\n" + items.map(it => it.type + " | " + it.summary + " | " + it.priority + " | " + it.storyPoints + " | " + it.labels + " | " + it.sourceId).join("\n"))} style={{ ...btnSm, textAlign: "left", padding: "8px 12px" }}>
              <div style={{ fontWeight: 700, fontSize: 11 }}>Export Excel backlog</div>
              <div style={{ fontSize: 9, color: N400, marginTop: 2 }}>Formatted .xlsx with all backlog items</div>
            </button>
          </div>
        </div>
        <div style={{ border: "1.5px solid #E2E8F0", borderRadius: 8, padding: 14 }}>
          <div style={{ fontWeight: 700, fontSize: 13, color: NAVY, marginBottom: 6 }}>Jira MCP actions</div>
          <div style={{ fontSize: 10, color: N400, marginBottom: 8, lineHeight: 1.4 }}>Connect Atlassian/Jira MCP to push items directly. These actions trigger via Claude chat.</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <button onClick={pushToJira} style={{ ...btnSm, textAlign: "left", padding: "8px 12px" }}>
              <div style={{ fontWeight: 700, fontSize: 11 }}>Push to Jira</div>
              <div style={{ fontSize: 9, color: N400, marginTop: 2 }}>Create {items.length} items in {jiraConfig.projectKey || "PROJ"}</div>
            </button>
            <button onClick={syncFromJira} style={{ ...btnSm, textAlign: "left", padding: "8px 12px" }}>
              <div style={{ fontWeight: 700, fontSize: 11 }}>Sync from Jira</div>
              <div style={{ fontSize: 9, color: N400, marginTop: 2 }}>Compare agent backlog with Jira state</div>
            </button>
            <button onClick={createSprint} style={{ ...btnSm, textAlign: "left", padding: "8px 12px" }}>
              <div style={{ fontWeight: 700, fontSize: 11 }}>Create sprint</div>
              <div style={{ fontSize: 9, color: N400, marginTop: 2 }}>New sprint with AI-suggested items</div>
            </button>
          </div>
        </div>
      </div>
    </div>)}
  </div>);
}

// ── Prompt Builder (enriched with field mapping + API specs + open questions) ──

function buildPrompt(docType, data, compliance, traceItems, actors, workflows, rules, entities, apiEndpoints, openQuestions, glossary, risks, nfrs, assumptions, decisions, dataVolumes) {
  const ctx = Object.entries(data).filter(([_, v]) => v && String(v).trim()).map(([k, v]) => k + ": " + v).join("\n");
  const compItems = Object.entries(compliance).filter(([_, v]) => v).map(([k]) => k.split("-")[0]).filter((v, i, a) => a.indexOf(v) === i).join(", ");
  const domain = data.domain || "General";

  const actorBlock = actors.length > 0 ? "\nACTORS:\n" + actors.map(a => a.id + " " + a.name + " (" + a.type + ") CRUD:" + CRUD_OPS.filter(op => a.dataAccess[op]).join("")).join("\n") : "";
  const wfBlock = workflows.length > 0 ? "\nWORKFLOWS:\n" + workflows.map(w => w.id + " " + w.name + ": " + w.steps.map((s, i) => (i + 1) + "." + s.description).join(" > ")).join("\n") : "";
  const brBlock = rules.length > 0 ? "\nBUSINESS RULES:\n" + rules.map(r => r.id + " " + r.name + " IF:" + r.condition + " THEN:" + r.action + " ELSE:" + r.exception).join("\n") : "";
  const trBlock = traceItems.filter(t => t.requirement).length > 0 ? "\nTRACEABILITY:\n" + traceItems.filter(t => t.requirement).map(t => t.reqId + ": " + t.requirement + " | " + t.testCase).join("\n") : "";
  const entityBlock = entities.length > 0 ? "\nDATA MODEL (" + entities.reduce((s, e) => s + e.fields.length, 0) + " fields):\n" + entities.map(e => e.name + " (" + e.id + "): " + e.fields.length + " fields [" + e.fields.filter(f => f.migrationStatus === "TBI").length + " TBI, " + e.fields.filter(f => f.migrationStatus === "Gap").length + " Gap]").join("\n") : "";
  const apiBlock = apiEndpoints.length > 0 ? "\nAPI ENDPOINTS:\n" + apiEndpoints.map(ep => ep.method + " " + ep.path + " - " + ep.description + " (entity: " + ep.entity + ")").join("\n") : "";
  const qBlock = openQuestions.filter(q => q.status === "Open" || q.status === "Blocked").length > 0 ? "\nOPEN QUESTIONS (" + openQuestions.filter(q => q.status === "Open" || q.status === "Blocked").length + "):\n" + openQuestions.filter(q => q.status === "Open" || q.status === "Blocked").map(q => q.id + " [" + q.priority + "]: " + q.question + " (re: " + q.fieldRef + ")").join("\n") : "";
  const glossBlock = glossary.length > 0 ? "\nGLOSSARY: " + glossary.map(g => g.term + "=" + g.definition).join("; ") : "";
  const riskBlock = risks && risks.length > 0 ? "\nRISK REGISTER (" + risks.length + " risks, " + risks.filter(r => r.prob * r.impact >= 15).length + " critical):\n" + risks.map(r => r.id + " [" + r.cat + " P" + r.prob + "xI" + r.impact + "=" + (r.prob * r.impact) + "] " + r.desc + " | Mitigation: " + r.mitigation + " | " + r.status).join("\n") : "";
  const nfrBlock = nfrs && nfrs.length > 0 ? "\nNON-FUNCTIONAL REQS:\n" + nfrs.map(n => n.id + " [" + n.cat + "/" + n.priority + "] " + n.req + " Target: " + n.target + " Measured by: " + n.method).join("\n") : "";
  const assumpBlock = assumptions && assumptions.length > 0 ? "\nASSUMPTIONS & DEPENDENCIES:\n" + assumptions.map(a => a.id + " [" + a.type + "] " + a.desc + " | Validated: " + a.validated + " | Impact: " + a.impact).join("\n") : "";
  const decBlock = decisions && decisions.length > 0 ? "\nDECISION LOG:\n" + decisions.map(d => d.id + " [" + d.status + "] " + d.decision + " | Rationale: " + d.rationale + " | Alternatives: " + d.alternatives).join("\n") : "";
  const volBlock = dataVolumes && dataVolumes.length > 0 ? "\nDATA VOLUMES:\n" + dataVolumes.map(v => v.entity + ": " + v.current + " rows, +" + v.growth + "%/yr, " + v.users + " peak users, " + v.apiCalls + " API/min, SLA: " + v.sla).join("\n") : "";
  const crBlock = arguments[16] && arguments[16].length > 0 ? "\nCHANGE REQUESTS (" + arguments[16].length + "):\n" + arguments[16].map(c => c.id + " [" + c.status + "/" + c.impact + "] " + c.title + " | Affects: " + c.affectedReqs + " " + c.affectedFields + " | Effort: " + c.effortDays + "d").join("\n") : "";

  const header = "Domain: " + domain + ". Senior BA/BI Expert (SFL Consulting), 25+ years. Lean Six Sigma Black Belt, SAP BO 11yr. Regulatory: IFRS, COREP, FINREP, PSD2/PSD3, ISAE 3402, SOX 404. AUDIT IS FIRST-CLASS DESIGN CONCERN." + (compItems ? "\nCOMPLIANCE: " + compItems : "") + actorBlock + wfBlock + brBlock + trBlock + entityBlock + apiBlock + qBlock + glossBlock + riskBlock + nfrBlock + assumpBlock + decBlock + volBlock + crBlock;

  const t = {
    brd: "BRD: 1.Executive Summary 2.Scope 3.Stakeholder RACI 4.Actor Catalogue+CRUD 5.Business Reqs (REQ-XXX+acceptance criteria+regulatory ref) 6.Business Rules Catalogue (IF/THEN/ELSE) 7.Data Model Overview (entities+field counts+TBI/Gap summary) 8.Process Flows 9.Non-Functional Reqs 10.Compliance Matrix 11.Open Questions Register 12.Traceability Summary 13.Glossary 14.Appendices",
    funcspec: "Functional Specs: 1.Introduction 2.System Context 3.Actor-System Matrix 4.Functional Reqs (FR-XXX+BR ref) 5.User Stories (Given/When/Then) 6.Data Model Detail (field-level specs per entity) 7.API Integration Specs (endpoints+payloads+error handling) 8.Business Rules Engine 9.Workflow-per-Field Matrix 10.Audit Trail Specs 11.Security Matrix 12.Glossary",
    gap: "Gap Analysis: 1.Summary 2.As-Is 3.To-Be 4.Gap Matrix (Process/Tech/Data/Compliance/People/Governance) 5.Field-Level Gaps (TBI+Gap fields per entity) 6.API Integration Gaps 7.Regulatory Gaps 8.Remediation Roadmap 9.Risk per gap 10.Open Questions Impact",
    bizcase: "Business Case: 1.Executive Summary 2.Strategic Alignment 3.Current Costs 4.Investment 5.Cost-Benefit 5yr 6.ROI/NPV/IRR 7.Risk (quantified) 8.Sensitivity 3 scenarios 9.Process Automation Savings 10.Compliance Cost Avoidance 11.Go/No-Go",
    fieldmap: "Field Mapping Document: For each entity, produce a complete field-by-field table with columns: #, Field Name, Label, Source Path, Target Field, Data Type, Edit Mode, Mandatory, BR Reference, Sample Value, Migration Status, Compliance Notes. Include workflow usage matrix showing which fields are used in each workflow action. Highlight TBI and Gap fields with specific recommendations. Include source-to-target transformation rules.",
    apispec_doc: "API Integration Specifications: For each endpoint, produce: 1.Endpoint details (method, path, auth) 2.Request/response JSON structures 3.Field mapping to data model entities 4.Error codes and handling (retry, circuit breaker, fallback) 5.Call sequence diagram (text-based) 6.Rate limiting and performance considerations 7.Compliance checkpoints per call 8.Testing approach",
  };
  return header + "\n\n" + t[docType] + "\n\nPROJECT INPUTS:\n" + ctx + "\n\nUse ## for sections. Reference actor/workflow/rule/field IDs. Audit trail mandatory. Flag all TBI/Gap items.";
}

  const cur = PHASES[phase];
  const fields = FIELD_CONFIG[cur?.id] || [];
  const isGen = cur?.id === "generate", isTrace = cur?.id === "traceability", isLogic = cur?.id === "logic", isDM = cur?.id === "datamodel", isAPI = cur?.id === "apispec", isOQ = cur?.id === "openqs", isSDLC = cur?.id === "sdlc", isGov = cur?.id === "governance", isNfr = cur?.id === "nfrs";
  const hasGen = Object.keys(generatedDocs).length > 0;
  const filled = fields.filter(f => data[f.key]?.trim()).length;
  const reqOk = fields.filter(f => f.required).every(f => data[f.key]?.trim());
  const totalFields = entities.reduce((s, e) => s + e.fields.length, 0);
  const groups = ["Plan", "Define", "Execute", "Validate", "Deliver", "Govern"];

  return (
    <div style={{ display: "flex", minHeight: "100vh", fontFamily: "'Calibri','Segoe UI',sans-serif", color: NAVY, background: N100 }}>

      {/* ═══ SIDEBAR ═══ */}
      <div style={{ width: 240, flexShrink: 0, background: NAVY, color: "#fff", display: "flex", flexDirection: "column", position: "sticky", top: 0, height: "100vh", overflowY: "auto" }}>
        <div style={{ padding: "20px 20px 16px", borderBottom: "1px solid rgba(255,255,255,.06)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 36, height: 36, borderRadius: 10, background: "linear-gradient(135deg," + GOLD + "," + GOLD_L + ")", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, fontWeight: 800, color: "#fff", fontFamily: "'Georgia',serif" }}>BA</div>
            <div><div style={{ fontSize: 17, fontWeight: 700, fontFamily: "'Georgia',serif", letterSpacing: -0.3 }}>BAForge</div><div style={{ fontSize: 9, color: N400, marginTop: 1 }}>v3.1</div></div>
          </div>
        </div>

        <div style={{ padding: "12px 16px", borderBottom: "1px solid rgba(255,255,255,.06)" }}>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={saveProject} style={{ flex: 1, background: "rgba(180,83,9,.15)", border: "1px solid rgba(180,83,9,.3)", borderRadius: 8, padding: "7px 0", color: GOLD_L, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>{saveStatus || "Save"}</button>
            <button onClick={newProject} style={{ flex: 1, background: "rgba(255,255,255,.05)", border: "1px solid rgba(255,255,255,.1)", borderRadius: 8, padding: "7px 0", color: N400, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>+ New</button>
          </div>
          {savedProjects.length > 0 && (<div style={{ marginTop: 10 }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: N400, letterSpacing: 1, textTransform: "uppercase", marginBottom: 6 }}>Projects</div>
            {savedProjects.slice(0, 5).map(p => (<div key={p.id} style={{ display: "flex", alignItems: "center", gap: 4, marginBottom: 3 }}>
              <button onClick={() => loadProject(p.id)} style={{ flex: 1, background: currentProjectId === p.id ? "rgba(180,83,9,.2)" : "transparent", border: "none", borderRadius: 6, padding: "5px 8px", color: currentProjectId === p.id ? GOLD_L : N400, fontSize: 11, cursor: "pointer", textAlign: "left", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</button>
              <button onClick={() => deleteProject(p.id)} style={{ background: "none", border: "none", color: "rgba(255,255,255,.2)", cursor: "pointer", fontSize: 10, padding: 0 }}>x</button>
            </div>))}
          </div>)}
        </div>

        <div style={{ flex: 1, padding: "12px 0", overflowY: "auto" }}>
          {groups.map(group => {
            const gPhases = PHASES.filter(p => p.group === group);
            return (<div key={group} style={{ marginBottom: 8 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: N400, letterSpacing: 1.5, textTransform: "uppercase", padding: "4px 20px", marginBottom: 2 }}>{group}</div>
              {gPhases.map(p => {
                const idx = PHASES.indexOf(p);
                const active = idx === phase, done = idx < phase;
                const hasData = (p.id === "logic" && (actors.length + workflows.length + rules.length) > 0) || (p.id === "datamodel" && entities.length > 0) || (p.id === "apispec" && apiEndpoints.length > 0) || (p.id === "traceability" && traceItems.length > 0) || (p.id === "openqs" && (openQuestions.length + glossary.length) > 0) || (p.id === "governance" && (risks.length + assumptions.length + decisions.length + changeRequests.length + Object.values(raci).filter(v => v).length) > 0) || (p.id === "nfrs" && (nfrs.length + dataVolumes.length) > 0) || (FIELD_CONFIG[p.id] && FIELD_CONFIG[p.id].some(f => data[f.key]?.trim()));
                return (<button key={p.id} onClick={() => setPhase(idx)} style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "9px 20px", border: "none", cursor: "pointer", background: active ? "rgba(180,83,9,.12)" : "transparent", borderRight: active ? "3px solid " + GOLD : "3px solid transparent" }}>
                  <div style={{ width: 22, height: 22, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, background: done ? GOLD : active ? "rgba(255,255,255,.12)" : "rgba(255,255,255,.04)", color: done || active ? "#fff" : N400, flexShrink: 0 }}>{done ? "\u2713" : idx + 1}</div>
                  <span style={{ fontSize: 13, fontWeight: active ? 700 : 500, color: active ? "#fff" : done ? N300 : N400, textAlign: "left" }}>{p.label}</span>
                  {hasData && !done && <div style={{ width: 6, height: 6, borderRadius: 3, background: GREEN, marginLeft: "auto", flexShrink: 0 }} />}
                </button>);
              })}
            </div>);
          })}
        </div>

        <div style={{ padding: "12px 20px", borderTop: "1px solid rgba(255,255,255,.06)", fontSize: 10, color: "rgba(255,255,255,.2)" }}>SFL Consulting<br/>Forged in 25 years of delivery</div>
      </div>

      {/* ═══ MAIN CONTENT ═══ */}
      <div style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column" }}>
        <div style={{ background: "#fff", borderBottom: "1px solid " + N200, padding: "16px 32px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 10 }}>
          <div>
            <h1 style={{ margin: 0, fontSize: 22, fontWeight: 700, fontFamily: "'Georgia',serif", color: NAVY }}>{cur.label}</h1>
            <p style={{ margin: "2px 0 0", fontSize: 13, color: N400 }}>{cur.desc}{fields.length > 0 && <span style={{ marginLeft: 12, background: N100, borderRadius: 8, padding: "2px 10px", fontSize: 11, fontWeight: 600 }}>{filled}/{fields.length}</span>}</p>
          </div>
          <span style={{ fontSize: 12, color: N400, fontWeight: 600 }}>Phase {phase + 1} of {PHASES.length}</span>
        </div>

        <div ref={contentRef} style={{ flex: 1, padding: "28px 32px", maxWidth: 960, overflow: "auto" }}>
          {isLogic ? <BusinessLogicPhase actors={actors} setActors={setActors} workflows={workflows} setWorkflows={setWorkflows} rules={rules} setRules={setRules} />
          : isDM ? <DataModelPhase entities={entities} setEntities={setEntities} workflows={workflows} />
          : isAPI ? <ApiSpecPhase apiEndpoints={apiEndpoints} setApiEndpoints={setApiEndpoints} />
          : isOQ ? <OpenItemsPhase openQuestions={openQuestions} setOpenQuestions={setOpenQuestions} glossary={glossary} setGlossary={setGlossary} />
          : isSDLC ? <SdlcPhase jiraConfig={jiraConfig} setJiraConfig={setJiraConfig} traceItems={traceItems} actors={actors} workflows={workflows} rules={rules} openQuestions={openQuestions} entities={entities} data={data} />
          : isTrace ? <TraceabilityPanel traceItems={traceItems} setTraceItems={setTraceItems} />
          : isGov ? <GovernancePhase risks={risks} setRisks={setRisks} assumptions={assumptions} setAssumptions={setAssumptions} decisions={decisions} setDecisions={setDecisions} changeRequests={changeRequests} setChangeRequests={setChangeRequests} raci={raci} setRaci={setRaci} actors={actors} />
          : isNfr ? <NFRVolumesPhase nfrs={nfrs} setNfrs={setNfrs} dataVolumes={dataVolumes} setDataVolumes={setDataVolumes} />
          : isGen ? (
            <div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 10, marginBottom: 24 }}>
                {[{ l: "Actors", v: actors.length }, { l: "Workflows", v: workflows.length }, { l: "Rules", v: rules.length }, { l: "Fields", v: totalFields }, { l: "Endpoints", v: apiEndpoints.length },
                  { l: "Requirements", v: traceItems.length }, { l: "Open Qs", v: openQuestions.filter(q => q.status === "Open").length }, { l: "Risks", v: risks.length }, { l: "NFRs", v: nfrs.length }, { l: "Decisions", v: decisions.length },
                  { l: "Assumptions", v: assumptions.length }, { l: "Changes", v: changeRequests.length }, { l: "RACI cells", v: Object.values(raci).filter(v => v).length }, { l: "Jira items", v: traceItems.length + rules.length + workflows.length }, { l: "Entities", v: entities.length }].map((s, i) => (<div key={i} style={{ ...card, textAlign: "center", padding: 14 }}>
                  <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Georgia',serif", color: s.v > 0 ? NAVY : N300 }}>{s.v}</div>
                  <div style={{ fontSize: 10, color: N400, marginTop: 2, fontWeight: 600, letterSpacing: 0.3, textTransform: "uppercase" }}>{s.l}</div>
                </div>))}
              </div>
              {data.domain && <ComplianceGate domain={data.domain} complianceState={complianceState} />}
              <div style={{ marginTop: 16 }}><McpPanel data={data} /></div>
              <div style={{ marginTop: 16 }}><StakeholderReview reviewers={reviewers} setReviewers={setReviewers} /></div>
              <h3 style={{ fontSize: 18, fontFamily: "'Georgia',serif", fontWeight: 700, color: NAVY, margin: "24px 0 14px" }}>Select documents to generate</h3>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 20 }}>
                {DOC_TYPES.map(doc => (
                  <div key={doc.id} onClick={() => toggleDoc(doc.id)} style={{ ...card, cursor: "pointer", padding: 16, border: selectedDocs.includes(doc.id) ? "2px solid " + GOLD : "1px solid " + N200, background: selectedDocs.includes(doc.id) ? GOLD_R : "#fff" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                      <div style={{ width: 20, height: 20, borderRadius: 6, border: selectedDocs.includes(doc.id) ? "none" : "2px solid " + N300, background: selectedDocs.includes(doc.id) ? GOLD : "#fff", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 11, fontWeight: 700 }}>{selectedDocs.includes(doc.id) && "\u2713"}</div>
                      <span style={{ fontWeight: 700, fontSize: 13, color: NAVY }}>{doc.label}</span>
                    </div>
                    <div style={{ fontSize: 12, color: N400 }}>{doc.desc}</div>
                  </div>
                ))}
              </div>
              {selectedDocs.length > 0 && !hasGen && <button onClick={generateDocs} disabled={generating} style={{ width: "100%", padding: 16, borderRadius: 12, fontSize: 15, fontWeight: 700, cursor: generating ? "wait" : "pointer", background: generating ? N300 : "linear-gradient(135deg," + GOLD + "," + GOLD_L + ")", color: "#fff", border: "none", boxShadow: generating ? "none" : "0 4px 16px rgba(180,83,9,.25)" }}>{generating ? genProgress : "Generate " + selectedDocs.length + " document" + (selectedDocs.length > 1 ? "s" : "")}</button>}
              {hasGen && (<div style={{ marginTop: 20 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <h3 style={{ fontSize: 18, fontFamily: "'Georgia',serif", fontWeight: 700, color: NAVY, margin: 0 }}>Generated documents</h3>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={exportWord} style={{ background: "linear-gradient(135deg," + GOLD + "," + GOLD_L + ")", color: "#fff", border: "none", borderRadius: 8, padding: "8px 20px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Export .docx</button>
                    <button onClick={() => setGeneratedDocs({})} style={btnSm}>Regenerate</button>
                  </div>
                </div>
                {selectedDocs.map(id => { const d = DOC_TYPES.find(x => x.id === id); return <GenDoc key={id} doc={d} data={data} content={generatedDocs[id]} />; })}
              </div>)}
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
              {fields.map(field => (<div key={field.key}>
                <label style={{ display: "block", fontSize: 13, fontWeight: 700, color: N600, marginBottom: 5 }}>{field.label}{field.required && <span style={{ color: RED, marginLeft: 4 }}>*</span>}</label>
                <FieldRenderer field={field} value={data[field.key]} onChange={updateField} />
                {field.type === "textarea" && <AiBtn loading={aiLoading[field.key]} suggestion={aiSuggestions[field.key]} onRequest={() => requestAi(field)} onApply={() => applyAi(field.key)} />}
              </div>))}
              {cur.id === "discovery" && data.domain && (<div style={{ marginTop: 8 }}>
                <button onClick={() => setShowCompliance(!showCompliance)} style={{ ...btnSm, width: "100%", textAlign: "left", borderColor: NAVY, color: NAVY }}>
                  {showCompliance ? "\u25BC" : "\u25B6"} Compliance: {data.domain} — {Object.values(complianceState).filter(Boolean).length} checks completed
                </button>
                {showCompliance && <div style={{ marginTop: 10 }}><CompliancePanel domain={data.domain} complianceState={complianceState} setComplianceState={setComplianceState} /></div>}
              </div>)}
            </div>
          )}
        </div>

        <div style={{ padding: "14px 32px", borderTop: "1px solid " + N200, display: "flex", justifyContent: "space-between", alignItems: "center", background: "#fff", position: "sticky", bottom: 0, zIndex: 10 }}>
          <button onClick={() => setPhase(Math.max(0, phase - 1))} disabled={phase === 0} style={{ ...btnSm, opacity: phase === 0 ? 0.3 : 1, padding: "10px 24px", fontSize: 13 }}>&larr; Previous</button>
          <div style={{ fontSize: 12, color: N400, fontWeight: 600 }}>
            {data.projectName && <span style={{ color: NAVY, marginRight: 8 }}>{data.projectName}</span>}
            {data.domain && <span style={{ background: GOLD_BG, color: GOLD, borderRadius: 8, padding: "3px 10px", fontSize: 11, fontWeight: 600 }}>{data.domain}</span>}
          </div>
          {phase < PHASES.length - 1 ? <button onClick={() => setPhase(phase + 1)} disabled={fields.some(f => f.required) && !reqOk} style={{ ...btnAdd, opacity: (fields.some(f => f.required) && !reqOk) ? 0.3 : 1, padding: "10px 24px", fontSize: 13 }}>Next &rarr;</button> : <div style={{ width: 100 }} />}
        </div>
      </div>
    </div>
  );
}

    // Render
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
